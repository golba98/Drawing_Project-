<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Pen cursor: tip at bottom-left (hotspot 2,30) -->
  <g transform="translate(4, 2) rotate(-45, 12, 16)">
    <!-- Pen barrel -->
    <rect x="9" y="4" width="6" height="16" rx="1.5" fill="#2a2a2a" stroke="none"/>
    <!-- Pen tip -->
    <polygon points="9,20 15,20 12,27" fill="#1a1a1a"/>
    <!-- Pen clip accent -->
    <rect x="13.5" y="5" width="1.5" height="14" rx="0.75" fill="#555"/>
    <!-- Pen top cap -->
    <rect x="9" y="2" width="6" height="3" rx="1" fill="#444"/>
  </g>
  <!-- Tip dot for precision indicator -->
  <circle cx="3" cy="29" r="1.5" fill="#e74c3c" opacity="0.9"/>
</svg>
