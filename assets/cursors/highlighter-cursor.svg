<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Highlighter cursor: angled marker, tip at bottom-left (hotspot 2,28) -->
  <!-- Marker body -->
  <rect x="6" y="3" width="8" height="19" rx="2" fill="#f4c430" stroke="#c9a80a" stroke-width="1" transform="rotate(-20, 10, 12)"/>
  <!-- Marker cap (top) -->
  <rect x="6" y="2" width="8" height="4" rx="1.5" fill="#e0b820" stroke="#c9a80a" stroke-width="0.5" transform="rotate(-20, 10, 4)"/>
  <!-- Marker tip (bottom) -->
  <rect x="7" y="20" width="6" height="5" rx="1" fill="#d4a017" transform="rotate(-20, 10, 22)"/>
  <!-- Highlight stripe on barrel -->
  <rect x="8" y="6" width="2.5" height="14" rx="1" fill="rgba(255,255,255,0.35)" transform="rotate(-20, 9, 13)"/>
  <!-- Tip dot -->
  <circle cx="3" cy="28" r="1.5" fill="#f4c430" stroke="#c9a80a" stroke-width="0.5" opacity="0.9"/>
</svg>
