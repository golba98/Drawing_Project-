<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Line/ruler cursor: crosshair with ruler feel, center hotspot (16,16) -->
  <!-- Horizontal line -->
  <line x1="2" y1="16" x2="30" y2="16" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Vertical line -->
  <line x1="16" y1="2" x2="16" y2="30" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Center ring -->
  <circle cx="16" cy="16" r="3" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.2" fill="#e74c3c"/>
  <!-- Tick marks on crosshair -->
  <line x1="8" y1="14" x2="8" y2="18" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="24" y1="14" x2="24" y2="18" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="14" y1="8" x2="18" y2="8" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="14" y1="24" x2="18" y2="24" stroke="#2a2a2a" stroke-width="1"/>
</svg>
