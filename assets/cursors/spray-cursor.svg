<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Spray can cursor: hotspot at nozzle tip (4, 4) -->
  <!-- Can body -->
  <rect x="10" y="12" width="11" height="16" rx="2" fill="#555" stroke="#333" stroke-width="0.5"/>
  <!-- Can top cap -->
  <rect x="12" y="9" width="7" height="4" rx="1.5" fill="#444" stroke="#333" stroke-width="0.5"/>
  <!-- Nozzle -->
  <rect x="8" y="10" width="4" height="2" rx="1" fill="#333"/>
  <!-- Nozzle tip/button -->
  <rect x="6" y="9" width="4" height="3" rx="1" fill="#444" stroke="#333" stroke-width="0.5"/>
  <!-- Label stripe on can -->
  <rect x="10" y="16" width="11" height="5" rx="0" fill="#777"/>
  <!-- Spray dots coming from nozzle -->
  <circle cx="3" cy="5" r="1.2" fill="#2a2a2a" opacity="0.7"/>
  <circle cx="5" cy="3" r="1.0" fill="#2a2a2a" opacity="0.5"/>
  <circle cx="2" cy="8" r="0.9" fill="#2a2a2a" opacity="0.6"/>
  <circle cx="5" cy="7" r="0.8" fill="#2a2a2a" opacity="0.4"/>
  <circle cx="1" cy="4" r="0.7" fill="#2a2a2a" opacity="0.4"/>
  <!-- Can shine -->
  <rect x="12" y="13" width="2" height="8" rx="1" fill="rgba(255,255,255,0.15)"/>
</svg>
